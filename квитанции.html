<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квитанция</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #f5f5f5;
            padding: 20px;
            color: #000;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 40px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #000;
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 12px;
            color: #333;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 20px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea {
            border: 1px solid #000;
            padding: 10px;
            font-family: 'Arial', sans-serif;
            font-size: 13px;
            border-radius: 0;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            background-color: #f9f9f9;
        }

        /* Таблица */
        .table-section {
            margin-bottom: 30px;
        }

        .table-section h3 {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border: 2px solid #000;
            font-size: 12px;
        }

        table th {
            background: #f0f0f0;
            border: 1px solid #000;
            padding: 12px;
            text-align: left;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        table td {
            border: 1px solid #000;
            padding: 12px;
            height: 40px;
            vertical-align: top;
        }

        table input {
            width: 100%;
            border: none;
            padding: 0;
            font-family: 'Arial', sans-serif;
            font-size: 12px;
        }

        table input:focus {
            outline: none;
            background-color: #fffacd;
        }

        .row-number {
            width: 40px;
            text-align: center;
            font-weight: bold;
        }

        /* Итого */
        .totals-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .total-box {
            border: 2px solid #000;
            padding: 20px;
        }

        .total-box h4 {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .total-row label {
            font-weight: bold;
        }

        .total-row input {
            border: none;
            border-bottom: 1px solid #000;
            width: 150px;
            text-align: right;
            font-family: 'Arial', sans-serif;
            padding: 2px 5px;
        }

        /* Подпись */
        .signature-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #000;
        }

        .signature-box {
            text-align: center;
        }

        .signature-line {
            border-top: 1px solid #000;
            padding-top: 5px;
            font-size: 11px;
            margin-top: 40px;
        }

        /* Кнопки */
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #000;
            background: #fff;
            color: #000;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }

        button:hover {
            background: #000;
            color: #fff;
        }

        button.print {
            background: #000;
            color: #fff;
        }

        button.print:hover {
            background: #333;
        }

        .btn-clear {
            background: #f5f5f5;
        }

        /* Печать */
        @media print {
            body {
                background: #fff;
                padding: 0;
            }

            .container {
                box-shadow: none;
                padding: 0;
            }

            .buttons {
                display: none;
            }

            table input,
            .form-group input,
            .form-group textarea {
                border: none;
                background: none;
            }
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .totals-section {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .signature-section {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .container {
                padding: 20px;
            }

            table {
                font-size: 10px;
            }

            table th,
            table td {
                padding: 8px;
                height: auto;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>КВИТАНЦИЯ</h1>
        <p>Документ приема-передачи ювелирных изделий</p>
    </div>

    <!-- Основные поля -->
    <div class="form-section">
        <div class="form-row">
            <div class="form-group">
                <label for="receipt-number">Номер квитанции</label>
                <input type="text" id="receipt-number" placeholder="КВ. 000001">
            </div>
            <div class="form-group">
                <label for="client-name">Заказчик (ФИО)</label>
                <input type="text" id="client-name" placeholder="Введите имя клиента">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="date-received">Дата приема</label>
                <input type="date" id="date-received">
            </div>
            <div class="form-group">
                <label for="date-delivery">Дата выдачи</label>
                <input type="date" id="date-delivery">
            </div>
        </div>

        <div class="form-row full">
            <div class="form-group">
                <label for="description">Описание ценностей и камней</label>
                <textarea id="description" placeholder="По��робное описание изделий, материалов и камней..."></textarea>
            </div>
        </div>
    </div>

    <!-- Таблица деталей -->
    <div class="table-section">
        <h3>Детали изделий</h3>
        <table>
            <thead>
                <tr>
                    <th class="row-number">№</th>
                    <th>Наименование метала и камней</th>
                    <th>Проба</th>
                    <th>Фактическая лигатура</th>
                    <th>В пересчете на пробу (гр)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="row-number">1</td>
                    <td><input type="text" placeholder="Золото с бриллиантом"></td>
                    <td><input type="text" placeholder="585"></td>
                    <td><input type="text" placeholder="Золото"></td>
                    <td><input type="number" placeholder="0.00" step="0.01"></td>
                </tr>
                <tr>
                    <td class="row-number">2</td>
                    <td><input type="text" placeholder=""></td>
                    <td><input type="text" placeholder=""></td>
                    <td><input type="text" placeholder=""></td>
                    <td><input type="number" placeholder="0.00" step="0.01"></td>
                </tr>
                <tr>
                    <td class="row-number">3</td>
                    <td><input type="text" placeholder=""></td>
                    <td><input type="text" placeholder=""></td>
                    <td><input type="text" placeholder=""></td>
                    <td><input type="number" placeholder="0.00" step="0.01"></td>
                </tr>
                <tr>
                    <td class="row-number">4</td>
                    <td><input type="text" placeholder=""></td>
                    <td><input type="text" placeholder=""></td>
                    <td><input type="text" placeholder=""></td>
                    <td><input type="number" placeholder="0.00" step="0.01"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Итоги -->
    <div class="totals-section">
        <div class="total-box">
            <h4>Общие сведения</h4>
            <div class="total-row">
                <label>Общее количество изделий:</label>
                <input type="number" id="total-items" placeholder="0" value="0">
            </div>
            <div class="total-row">
                <label>Общий вес (гр):</label>
                <input type="number" id="total-weight" placeholder="0.00" step="0.01" value="0.00">
            </div>
        </div>

        <div class="total-box">
            <h4>Стоимость работ</h4>
            <div class="total-row">
                <label>Стоимость (₽):</label>
                <input type="number" id="total-cost" placeholder="0.00" step="0.01" value="0.00">
            </div>
            <div class="total-row">
                <label>Комиссия (%):</label>
                <input type="number" id="commission" placeholder="0" value="0">
            </div>
        </div>
    </div>

    <!-- Подписи -->
    <div class="signature-section">
        <div class="signature-box">
            <p style="font-size: 11px; margin-bottom: 30px;">ПОЛУЧИЛ / ПОЛУЧИЛА</p>
            <div class="signature-line">Подпись и ФИО клиента</div>
        </div>
        <div class="signature-box">
            <p style="font-size: 11px; margin-bottom: 30px;">ПРИНЯЛ / ПРИНЯЛА</p>
            <div class="signature-line">Подпись и ФИО мастера</div>
        </div>
    </div>

    <!-- Кнопки -->
    <div class="buttons">
        <button class="print" onclick="window.print()">🖨️ Печать</button>
        <button class="btn-clear" onclick="clearForm()">✕ Очистить</button>
        <button onclick="downloadPDF()">💾 Скачать PDF</button>
    </div>
</div>

<script>
    function clearForm() {
        if (confirm('Вы уверены? Все данные будут удалены.')) {
            document.querySelectorAll('input, textarea').forEach(el => el.value = '');
        }
    }

    function downloadPDF() {
        alert('Функция скачивания PDF будет доступна в следующей версии');
    }

    // Автосохранение в localStorage
    document.querySelectorAll('input, textarea').forEach(el => {
        el.addEventListener('change', () => {
            localStorage.setItem(el.id, el.value);
        });

        // Загрузка сохраненных данных
        if (localStorage.getItem(el.id)) {
            el.value = localStorage.getItem(el.id);
        }
    });
</script>

</body>
</html>
